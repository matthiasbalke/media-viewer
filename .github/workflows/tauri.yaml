name: 'tauri'

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            arch: 'aarch64'
            args: '--target aarch64-apple-darwin'
            pkgConfigPath: '/opt/homebrew/lib/pkgconfig'
          - platform: 'macos-15-intel'
            arch: 'x86_64'
            args: '--target x86_64-apple-darwin'
            pkgConfigPath: '/usr/local/lib/pkgconfig'

          - platform: 'ubuntu-22.04'
            arch: 'amd64'
            args: ''
            pkgConfigPath: '/usr/local/lib/pkgconfig'

          - platform: 'ubuntu-22.04-arm' # Only available in public repos.
            arch: 'arm64'
            args: ''
            pkgConfigPath: '/usr/local/lib/pkgconfig'

          - platform: 'windows-latest'
            arch: 'x64'
            args: ''
            pkgConfigPath: 'C:\\vcpkg\\installed\\x64-windows-static-md\\lib\\pkgconfig'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install libheif (macOS only)
        if: ${{ startsWith(matrix.platform, 'macos') }}
        run: |
          brew install libheif

      - name: collect libheif frameworks for bundling (macOS only)
        if: ${{ startsWith(matrix.platform, 'macos') }}
        run: ./scripts/update-macos-tauri-conf.sh

      - name: cache libheif build (ubuntu only)
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        id: cache-libheif
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: libheif-1.21.2-${{ matrix.platform }}-${{ matrix.arch }}

      - name: install apt dependencies (ubuntu only)
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: compile libheif (ubuntu only)
        if: ${{ startsWith(matrix.platform, 'ubuntu') && steps.cache-libheif.outputs.cache-hit != 'true' }}
        run: |
          sudo apt-get install -y cmake libde265-dev libx265-dev libjpeg-dev libpng-dev
          # Ubuntu apt repos only have libheif 1.12-1.17; libheif-rs 2.7.0 requires >= 1.21
          LIBHEIF_VERSION=1.21.2
          wget -q "https://github.com/strukturag/libheif/releases/download/v${LIBHEIF_VERSION}/libheif-${LIBHEIF_VERSION}.tar.gz"
          tar -xzf "libheif-${LIBHEIF_VERSION}.tar.gz"
          cd "libheif-${LIBHEIF_VERSION}"
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DWITH_EXAMPLES=OFF -DWITH_TESTS=OFF .
          make -j$(nproc)
          sudo make install

      - name: register libheif (ubuntu only)
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        run: sudo ldconfig

      - name: install libheif (windows only)
        if: ${{ startsWith(matrix.platform, 'windows') }}
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
          ACTIONS_CACHE_URL: ${{ env.ACTIONS_CACHE_URL }}
          ACTIONS_RUNTIME_TOKEN: ${{ env.ACTIONS_RUNTIME_TOKEN }}
        run: |
          vcpkg install libheif:x64-windows-static-md
          vcpkg integrate install

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
#          cache: 'yarn' # Set this to npm, yarn or pnpm.

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: bun install # change this to npm or pnpm depending on which one you use.

      - name: build and create release candidate
        uses: tauri-apps/tauri-action@v0
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PKG_CONFIG_PATH: ${{ matrix.pkgConfigPath }}
          VCPKG_ROOT: C:\vcpkg
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          assetNamePattern: "[platform]-[arch]-[name]-[version][ext]"
          args: ${{ matrix.args }} --features libheif

      - name: build and provide workflow artifacts
        uses: tauri-apps/tauri-action@v0
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: ${{ matrix.pkgConfigPath }}
          VCPKG_ROOT: C:\vcpkg
        with:
          assetNamePattern: "[platform]-[arch]-[name]-[version][ext]"
          # will be released in 1.0.0
          #uploadWorkflowArtifacts: true
          args: ${{ matrix.args }} --features libheif --no-sign

      - name: Upload macOS bundle artifacts
        uses: actions/upload-artifact@v6
        if: ${{ startsWith(matrix.platform, 'macos') && github.event_name == 'pull_request' }}
        with:
          name: tauri-bundles-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/macos/media-viewer.app.tar.gz
            src-tauri/target/**/release/bundle/macos/media-viewer.app.tar.gz.sig
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/dmg/*.dmg.sig

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v6
        if: ${{ startsWith(matrix.platform, 'windows') && github.event_name == 'pull_request' }}
        with:
          name: tauri-bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/msi/*.msi.sig
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.exe.sig

      - name: Upload Linux bundle artifacts
        uses: actions/upload-artifact@v6
        if: ${{ startsWith(matrix.platform, 'ubuntu') && github.event_name == 'pull_request' }}
        with:
          name: tauri-bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/deb/*.deb.sig
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/rpm/*.rpm.sig
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/appimage/*.AppImage.sig

  smoke-test:
    name: Smoke Test
    needs: publish-tauri
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            artifact-name: 'tauri-bundles-macos-latest-aarch64'
          - platform: 'macos-15-intel'
            artifact-name: 'tauri-bundles-macos-15-intel-x86_64'
          - platform: 'ubuntu-22.04'
            artifact-name: 'tauri-bundles-ubuntu-22.04'
          - platform: 'ubuntu-22.04-arm'
            artifact-name: 'tauri-bundles-ubuntu-22.04-arm'
          - platform: 'windows-latest'
            artifact-name: 'tauri-bundles-windows-latest'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: bundle

      - name: Install runtime dependencies (Linux only)
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 xvfb

      - name: Smoke test (macOS)
        if: ${{ startsWith(matrix.platform, 'macos') }}
        run: |
          APP_TARBALL=$(find bundle -name "*.app.tar.gz" | head -1)
          tar -xzf "$APP_TARBALL" -C "$(dirname "$APP_TARBALL")"
          APP_PATH=$(find bundle -name "media-viewer.app" -type d | head -1)
          xattr -cr "$APP_PATH"
          BINARY="$APP_PATH/Contents/MacOS/media-viewer"
          chmod +x "$BINARY"
          timeout 5s "$BINARY"
          EXIT=$?
          [ $EXIT -eq 0 ] || [ $EXIT -eq 124 ]

      - name: Smoke test (Linux)
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        run: |
          APPIMAGE=$(find bundle -name "*.AppImage" | head -1)
          chmod +x "$APPIMAGE"
          xvfb-run --auto-servernum timeout 5s "$APPIMAGE"
          EXIT=$?
          [ $EXIT -eq 0 ] || [ $EXIT -eq 124 ]

      - name: Smoke test (Windows)
        if: ${{ startsWith(matrix.platform, 'windows') }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path bundle -Recurse -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "No NSIS installer found"; exit 1 }
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          $searchPaths = @($env:ProgramFiles, ${env:ProgramFiles(x86)}, "$env:LOCALAPPDATA\Programs")
          $app = $null
          foreach ($path in $searchPaths) {
            $app = Get-ChildItem -Path $path -Recurse -Filter "media-viewer.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($app) { break }
          }
          if (-not $app) { Write-Error "Installed binary not found"; exit 1 }
          $p = Start-Process -FilePath $app.FullName -PassThru
          Start-Sleep -Seconds 5
          if ($p.HasExited -and $p.ExitCode -ne 0) {
            Write-Error "App crashed with exit code $($p.ExitCode)"
            exit 1
          }
          if (-not $p.HasExited) { $p.Kill() }
